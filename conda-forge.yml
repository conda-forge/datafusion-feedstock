azure:
  free_disk_space:
  - apt
  - cache
  - docker
  settings_linux:
    swapfile_size: 20GiB
  settings_win:
    variables:
      SET_PAGEFILE: 'True'
bot:
  automerge: true
conda_build:
  pkg_format: '2'
conda_forge_output_validation: true
github:
  branch_name: main
  tooling_branch_name: main
provider:
  linux_aarch64: default
  osx_arm64: default
test: native_and_emulated
